<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강태은 | 도구</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0a0e1a 0%, #0d1832 40%, #0f2045 70%, #0a1628 100%);
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      color: #333;
      padding: 32px 16px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 52px 56px;
      max-width: 560px;
      width: 100%;
      box-shadow:
        0 32px 80px rgba(0, 0, 0, 0.45),
        0 8px 24px rgba(0, 0, 0, 0.25);
    }

    /* ── 네비게이션 ── */
    .nav {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .nav a {
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
      text-decoration: none;
      padding: 6px 18px;
      border-radius: 20px;
      border: 1.5px solid #e8e8e8;
      background: #f5f5f5;
      letter-spacing: 0.3px;
      transition: all 0.2s;
    }

    .nav a:hover {
      color: #03c75a;
      border-color: #03c75a;
      background: #e8faf1;
    }

    .nav a.active {
      color: #fff;
      background: linear-gradient(135deg, #00c473, #03c75a);
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(0, 196, 115, 0.35);
    }

    /* ── 도구 탭 ── */
    .tool-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 36px;
      background: #f5f7fb;
      border-radius: 14px;
      padding: 5px;
    }

    .tool-tab {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      color: #999;
      background: transparent;
      transition: all 0.2s;
      letter-spacing: -0.2px;
    }

    .tool-tab:hover {
      color: #555;
    }

    .tool-tab.active {
      background: #fff;
      color: #111;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    /* ── 헤더 ── */
    .tool-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .tool-icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #0a0e1a, #0f2045);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .tool-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #111;
      margin-bottom: 10px;
    }

    .tool-desc {
      font-size: 14px;
      font-weight: 500;
      color: #666;
      line-height: 1.7;
    }

    .tool-desc em {
      font-style: normal;
      color: #03c75a;
      font-weight: 700;
    }

    /* ── 구분선 ── */
    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 36px 0;
    }

    /* ── 섹션 레이블 ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── 입력 영역 ── */
    .input-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .idea-textarea {
      width: 100%;
      min-height: 100px;
      padding: 16px 18px;
      border: 1.5px solid #e2e6ee;
      border-radius: 14px;
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      line-height: 1.7;
      color: #333;
      background: #f7f9fc;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .idea-textarea:focus {
      border-color: #03c75a;
      box-shadow: 0 0 0 3px rgba(3, 199, 90, 0.12);
      background: #fff;
    }

    .idea-textarea::placeholder {
      color: #bbb;
    }

    .generate-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00c473, #03c75a);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 14px rgba(0, 196, 115, 0.4);
    }

    .generate-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 196, 115, 0.5);
    }

    .generate-btn:active {
      transform: translateY(0);
    }

    .generate-btn:disabled {
      background: #d0d4dc;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* ── 로딩 스피너 ── */
    .loading-row {
      display: none;
      align-items: center;
      gap: 10px;
      color: #aaa;
      font-size: 13px;
      font-weight: 500;
      margin-top: 4px;
    }

    .loading-row.visible {
      display: flex;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e0e0e0;
      border-top-color: #03c75a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    /* ── 결과 영역 ── */
    .result-section {
      display: none;
      margin-top: 0;
    }

    .result-section.visible {
      display: block;
    }

    .result-box {
      background: #f7f9fc;
      border: 1px solid #eff1f5;
      border-radius: 14px;
      padding: 20px 22px;
    }

    .result-text {
      font-size: 14.5px;
      color: #222;
      line-height: 1.85;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    /* PRD 결과 스타일 */
    .prd-section-title {
      font-size: 13px;
      font-weight: 700;
      color: #03c75a;
      letter-spacing: 0.2px;
      margin-top: 16px;
      margin-bottom: 4px;
      display: block;
    }

    .prd-section-title:first-child {
      margin-top: 0;
    }

    .prd-section-body {
      font-size: 14px;
      color: #333;
      line-height: 1.85;
      white-space: pre-wrap;
      word-break: keep-all;
      display: block;
    }

    .copy-btn {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: #fff;
      border: 1.5px solid #e2e6ee;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      color: #03c75a;
      border-color: #03c75a;
      background: #e8faf1;
    }

    .copy-btn.copied {
      color: #03c75a;
      border-color: #03c75a;
      background: #e8faf1;
    }

    .copy-btn svg {
      flex-shrink: 0;
    }

    /* ── 에러 ── */
    .error-msg {
      display: none;
      background: #fff5f5;
      border: 1px solid #ffd0d0;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 13.5px;
      color: #cc4444;
      margin-top: 0;
    }

    .error-msg.visible {
      display: block;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #bbb;
      text-align: center;
    }

    /* ── 스크롤 애니메이션 ── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- 네비게이션 -->
    <nav class="nav">
      <a href="index.html">소개</a>
      <a href="projects.html">프로젝트</a>
      <a href="tools.html" class="active">도구</a>
    </nav>

    <!-- 도구 탭 -->
    <div class="tool-tabs reveal">
      <button class="tool-tab active" id="tabStory" onclick="switchTool('story')">✍️ 사용자 스토리</button>
      <button class="tool-tab" id="tabPRD" onclick="switchTool('prd')">📋 PRD 작성 도우미</button>
    </div>

    <!-- ════════════════════════════════════════
         도구 1: 사용자 스토리 생성기
    ════════════════════════════════════════ -->
    <div id="toolStory">

      <div class="tool-header reveal">
        <div class="tool-icon">✍️</div>
        <div class="tool-title">사용자 스토리 생성기</div>
        <div class="tool-desc">
          기능 아이디어를 입력하면<br />
          <em>AI가 사용자 스토리 형식</em>으로 변환해드려요
        </div>
      </div>

      <hr class="divider" />

      <div class="reveal" style="transition-delay: 0.07s;">
        <div class="section-label">기능 아이디어 입력</div>
        <div class="input-area">
          <textarea
            class="idea-textarea"
            id="storyInput"
            placeholder="예: 사용자가 상품 이미지를 올리면 AI가 자동으로 상품명, 카테고리, 설명을 생성해주는 기능"
          ></textarea>
          <button class="generate-btn" id="storyBtn">사용자 스토리 생성</button>
          <div class="loading-row" id="storyLoading">
            <div class="spinner"></div>
            <span>AI가 사용자 스토리를 작성 중입니다...</span>
          </div>
        </div>
      </div>

      <div class="result-section reveal" id="storyResult" style="transition-delay: 0.05s;">
        <hr class="divider" />
        <div class="section-label">생성된 사용자 스토리</div>
        <div class="result-box">
          <div class="result-text" id="storyResultText"></div>
        </div>
        <button class="copy-btn" id="storyCopyBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          결과 복사하기
        </button>
      </div>

      <div class="error-msg" id="storyError">
        오류가 발생했습니다. 잠시 후 다시 시도해주세요.
      </div>

    </div><!-- /toolStory -->

    <!-- ════════════════════════════════════════
         도구 2: PRD 작성 도우미
    ════════════════════════════════════════ -->
    <div id="toolPRD" style="display:none;">

      <div class="tool-header reveal">
        <div class="tool-icon">📋</div>
        <div class="tool-title">PRD 작성 도우미</div>
        <div class="tool-desc">
          기능 아이디어 한 줄을 입력하면<br />
          <em>AI가 실무용 PRD 초안</em>을 바로 작성해드려요
        </div>
      </div>

      <hr class="divider" />

      <div class="reveal" style="transition-delay: 0.07s;">
        <div class="section-label">기능 아이디어 입력</div>
        <div class="input-area">
          <textarea
            class="idea-textarea"
            id="prdInput"
            placeholder="예: 판매자가 상품 등록 시 AI가 자동으로 상세페이지 초안을 생성해주는 기능"
          ></textarea>
          <button class="generate-btn" id="prdBtn">PRD 초안 생성</button>
          <div class="loading-row" id="prdLoading">
            <div class="spinner"></div>
            <span>AI가 PRD 초안을 작성 중입니다...</span>
          </div>
        </div>
      </div>

      <div class="result-section reveal" id="prdResult" style="transition-delay: 0.05s;">
        <hr class="divider" />
        <div class="section-label">생성된 PRD 초안</div>
        <div class="result-box">
          <div id="prdResultText"></div>
        </div>
        <button class="copy-btn" id="prdCopyBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          결과 복사하기
        </button>
      </div>

      <div class="error-msg" id="prdError">
        오류가 발생했습니다. 잠시 후 다시 시도해주세요.
      </div>

    </div><!-- /toolPRD -->

    <div class="footer reveal" style="transition-delay: 0.1s;">강태은의 도구 · 2026</div>
  </div>

  <script>
    /* ── 탭 전환 ── */
    function switchTool(tool) {
      const isStory = tool === 'story';
      document.getElementById('toolStory').style.display = isStory ? '' : 'none';
      document.getElementById('toolPRD').style.display = isStory ? 'none' : '';
      document.getElementById('tabStory').classList.toggle('active', isStory);
      document.getElementById('tabPRD').classList.toggle('active', !isStory);

      // 전환 시 새로 나타난 reveal 요소들 애니메이션
      const activeSection = isStory
        ? document.getElementById('toolStory')
        : document.getElementById('toolPRD');
      activeSection.querySelectorAll('.reveal:not(.visible)').forEach(el => {
        revealObserver.observe(el);
      });
    }

    /* ── 복사 버튼 공통 함수 ── */
    function setupCopyBtn(btnId, getTextFn) {
      const btn = document.getElementById(btnId);
      btn.addEventListener('click', async () => {
        const text = getTextFn();
        const copyIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
        const checkIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
        btn.classList.add('copied');
        btn.innerHTML = checkIcon + ' 복사 완료!';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = copyIcon + ' 결과 복사하기';
        }, 2000);
      });
    }

    /* ════════════════════════════════════════
       도구 1: 사용자 스토리 생성기
    ════════════════════════════════════════ */
    const storyInput   = document.getElementById('storyInput');
    const storyBtn     = document.getElementById('storyBtn');
    const storyLoading = document.getElementById('storyLoading');
    const storyResult  = document.getElementById('storyResult');
    const storyResultText = document.getElementById('storyResultText');
    const storyError   = document.getElementById('storyError');

    async function generateStory() {
      const idea = storyInput.value.trim();
      if (!idea || storyBtn.disabled) return;

      storyError.classList.remove('visible');
      storyResult.classList.remove('visible');
      storyBtn.disabled = true;
      storyInput.disabled = true;
      storyLoading.classList.add('visible');

      const systemPrompt = `당신은 IT 서비스 기획 전문가입니다.
사용자가 기능 아이디어를 설명하면, 아래 형식의 사용자 스토리로 변환해주세요.

형식:
사용자는 [목적]을 위해 [기능]을 원한다. 왜냐하면 [이유]

규칙:
- 기능 하나당 사용자 스토리 하나를 작성합니다.
- 필요하다면 2~4개의 스토리로 나눠 작성할 수 있습니다.
- 각 스토리는 개행으로 구분합니다.
- 번호를 붙이지 않고, 각 스토리만 출력합니다.
- 설명이나 부연 없이 스토리만 작성합니다.`;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [{ role: 'user', content: idea }],
            system: systemPrompt,
          }),
        });
        if (!res.ok) throw new Error('API 오류');
        const data = await res.json();
        const reply = data.message || '';
        if (!reply) throw new Error('빈 응답');

        storyResultText.textContent = reply;
        storyResult.classList.add('visible');
      } catch {
        storyError.classList.add('visible');
      }

      storyLoading.classList.remove('visible');
      storyBtn.disabled = false;
      storyInput.disabled = false;
    }

    storyBtn.addEventListener('click', generateStory);
    storyInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); generateStory(); }
    });
    setupCopyBtn('storyCopyBtn', () => storyResultText.textContent);

    /* ════════════════════════════════════════
       도구 2: PRD 작성 도우미
    ════════════════════════════════════════ */
    const prdInput   = document.getElementById('prdInput');
    const prdBtn     = document.getElementById('prdBtn');
    const prdLoading = document.getElementById('prdLoading');
    const prdResult  = document.getElementById('prdResult');
    const prdResultText = document.getElementById('prdResultText');
    const prdError   = document.getElementById('prdError');

    let prdRawText = '';

    function renderPRD(text) {
      // ## 헤딩을 스타일 요소로 변환해서 표시
      prdResultText.innerHTML = '';
      const lines = text.split('\n');
      let bodyLines = [];

      function flushBody() {
        if (bodyLines.length === 0) return;
        const span = document.createElement('span');
        span.className = 'prd-section-body';
        span.textContent = bodyLines.join('\n').replace(/^\n+|\n+$/g, '');
        prdResultText.appendChild(span);
        bodyLines = [];
      }

      lines.forEach(line => {
        if (line.startsWith('## ')) {
          flushBody();
          const title = document.createElement('span');
          title.className = 'prd-section-title';
          title.textContent = line.replace('## ', '');
          prdResultText.appendChild(title);
        } else {
          bodyLines.push(line);
        }
      });
      flushBody();
    }

    async function generatePRD() {
      const idea = prdInput.value.trim();
      if (!idea || prdBtn.disabled) return;

      prdError.classList.remove('visible');
      prdResult.classList.remove('visible');
      prdBtn.disabled = true;
      prdInput.disabled = true;
      prdLoading.classList.add('visible');

      try {
        const res = await fetch('/api/prd', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [{ role: 'user', content: idea }],
          }),
        });
        if (!res.ok) throw new Error('API 오류');
        const data = await res.json();
        const reply = data.message || '';
        if (!reply) throw new Error('빈 응답');

        prdRawText = reply;
        renderPRD(reply);
        prdResult.classList.add('visible');
      } catch {
        prdError.classList.add('visible');
      }

      prdLoading.classList.remove('visible');
      prdBtn.disabled = false;
      prdInput.disabled = false;
    }

    prdBtn.addEventListener('click', generatePRD);
    prdInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); generatePRD(); }
    });
    setupCopyBtn('prdCopyBtn', () => prdRawText);

    /* ── 스크롤 애니메이션 ── */
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
  </script>
</body>
</html>
