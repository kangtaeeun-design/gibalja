<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강태은 | 소개</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0a0e1a 0%, #0d1832 40%, #0f2045 70%, #0a1628 100%);
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
      padding: 32px 16px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 52px 56px;
      max-width: 480px;
      width: 100%;
      box-shadow:
        0 32px 80px rgba(0, 0, 0, 0.45),
        0 8px 24px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00c473, #03c75a);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 36px;
    }

    .name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .job {
      display: inline-block;
      font-size: 13px;
      font-weight: 600;
      color: #03c75a;
      background: #e8faf1;
      border-radius: 20px;
      padding: 4px 14px;
      margin-bottom: 36px;
      letter-spacing: 0.5px;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin-bottom: 36px;
    }

    .goal-label {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .goal {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.6;
      color: #111;
      letter-spacing: -0.3px;
    }

    .goal em {
      font-style: normal;
      color: #03c75a;
    }

    .skills-label {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 16px;
      margin-top: 36px;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .skill-tag {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      background: #f5f5f5;
      border: 1px solid #e8e8e8;
      border-radius: 20px;
      padding: 6px 16px;
      letter-spacing: 0.2px;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #bbb;
    }

    /* ── 챗봇 영역 ── */
    .chat-section {
      margin-top: 40px;
    }

    .chat-label {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
      text-align: center;
    }

    .chat-card {
      background: #f7f9fc;
      border-radius: 16px;
      padding: 16px;
      box-shadow:
        inset 0 1px 3px rgba(0, 0, 0, 0.05),
        0 2px 12px rgba(0, 0, 0, 0.06);
      border: 1px solid #eff1f5;
    }

    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 240px;
      overflow-y: auto;
      margin-bottom: 12px;
      padding-right: 2px;
      text-align: left;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #dde0e8;
      border-radius: 4px;
    }

    .message {
      display: flex;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 13.5px;
      line-height: 1.6;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #00c473, #00a86b);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 196, 115, 0.3);
    }

    .message.assistant .bubble {
      background: #fff;
      color: #333;
      border: 1px solid #e8ecf2;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    /* 타이핑 애니메이션 */
    .bubble.typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 14px 18px;
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    .typing-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #aab0c0;
      animation: blink 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    /* 입력창 */
    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      padding: 10px 16px;
      border: 1.5px solid #e2e6ee;
      border-radius: 24px;
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      color: #333;
      background: #fff;
    }

    .chat-input:focus {
      border-color: #03c75a;
      box-shadow: 0 0 0 3px rgba(3, 199, 90, 0.12);
    }

    .chat-input::placeholder {
      color: #bbb;
    }

    .chat-btn {
      width: 40px;
      height: 40px;
      min-width: 40px;
      background: linear-gradient(135deg, #00c473, #00a86b);
      color: #fff;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      box-shadow: 0 2px 8px rgba(0, 196, 115, 0.4);
    }

    .chat-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 14px rgba(0, 196, 115, 0.5);
    }

    .chat-btn:active {
      transform: scale(0.96);
    }

    .chat-btn:disabled {
      background: #d0d4dc;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .chat-btn svg {
      margin-left: 2px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <div class="name">강태은</div>
    <div class="job">Product Planner · 기획자</div>
    <hr class="divider" />
    <div class="goal-label">My Goal</div>
    <div class="goal">
      <em>3개월</em> 안에<br />뭐든 만드는 사람이 될 것이다.
    </div>
    <hr class="divider" style="margin-top: 36px; margin-bottom: 0;" />
    <div class="skills-label">배우는 중인 것들</div>
    <div class="skills">
      <span class="skill-tag">Claude Code</span>
      <span class="skill-tag">Git</span>
      <span class="skill-tag">HTML / CSS</span>
      <span class="skill-tag">배포 (Vercel)</span>
    </div>
    <div class="footer">첫 번째 웹페이지 · 2026</div>

    <div class="chat-section">
      <hr class="divider" style="margin-bottom: 20px;" />
      <div class="chat-label">강태은에 대해 뭐든 물어보세요 💬</div>
      <div class="chat-card">
        <div class="chat-messages" id="chatMessages">
          <div class="message assistant">
            <div class="bubble">안녕하세요! 강태은에 대해 궁금한 점이 있으시면 뭐든 물어보세요 😊</div>
          </div>
        </div>
        <div class="chat-input-row">
          <input
            type="text"
            class="chat-input"
            id="chatInput"
            placeholder="질문을 입력하세요..."
            autocomplete="off"
          />
          <button class="chat-btn" id="sendBtn" aria-label="전송">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const conversationHistory = [];

    function addMessage(role, text) {
      const messageEl = document.createElement('div');
      messageEl.className = `message ${role}`;

      const bubbleEl = document.createElement('div');
      bubbleEl.className = 'bubble';
      bubbleEl.textContent = text;

      messageEl.appendChild(bubbleEl);
      chatMessages.appendChild(messageEl);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      return messageEl;
    }

    function addTypingIndicator() {
      const messageEl = document.createElement('div');
      messageEl.className = 'message assistant';

      const bubbleEl = document.createElement('div');
      bubbleEl.className = 'bubble typing';
      bubbleEl.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';

      messageEl.appendChild(bubbleEl);
      chatMessages.appendChild(messageEl);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      return messageEl;
    }

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text || sendBtn.disabled) return;

      chatInput.value = '';
      sendBtn.disabled = true;
      chatInput.disabled = true;

      addMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });

      const loadingEl = addTypingIndicator();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory }),
        });

        const data = await res.json();
        const reply = data.message || '응답을 받지 못했습니다';

        loadingEl.remove();
        addMessage('assistant', reply);
        conversationHistory.push({ role: 'assistant', content: reply });
      } catch {
        loadingEl.remove();
        addMessage('assistant', '오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
      }

      sendBtn.disabled = false;
      chatInput.disabled = false;
      chatInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
