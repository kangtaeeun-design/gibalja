<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강태은 | 소개</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 60px 64px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00c473, #03c75a);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 36px;
    }

    .name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .job {
      display: inline-block;
      font-size: 13px;
      font-weight: 600;
      color: #03c75a;
      background: #e8faf1;
      border-radius: 20px;
      padding: 4px 14px;
      margin-bottom: 36px;
      letter-spacing: 0.5px;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin-bottom: 36px;
    }

    .goal-label {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .goal {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.6;
      color: #111;
      letter-spacing: -0.3px;
    }

    .goal em {
      font-style: normal;
      color: #03c75a;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <div class="name">강태은</div>
    <div class="job">Product Planner · 기획자</div>
    <hr class="divider" />
    <div class="goal-label">My Goal</div>
    <div class="goal">
      <em>3개월</em> 안에<br />뭐든 만드는 사람이 될 것이다.
    </div>
    <div class="footer">첫 번째 웹페이지 · 2026</div>
  </div>
</body>
</html>
